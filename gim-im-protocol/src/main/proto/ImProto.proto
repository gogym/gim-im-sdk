syntax = "proto3";

package gim.im;

option java_package = "io.getbit.gim.protocol.codec";
option java_outer_classname = "ImProto";
option java_multiple_files = false;

// ===================== 统一信封 =====================
// 所有消息的外层包装，路由和协议层只关心 Packet
message Packet {
  int32  cmd        = 1;   // 命令类型（见 Cmd 常量）
  int64  sequence   = 2;   // 客户端消息序号（去重 + ACK 关联）
  string requestId  = 3;   // 请求唯一ID（客户端生成的 UUID，幂等）
  int64  timestamp  = 4;   // 时间戳（毫秒）
  bytes  body       = 5;   // 业务消息体（按 cmd 解析为不同 message 类型）
}

// ===================== 连接管理 (cmd: 1-9) =====================

// cmd = 1: 绑定请求（首包认证）
message BindRequest {
  string userId   = 1;   // 用户ID
  string token    = 2;   // JWT token，服务端校验
  string device   = 3;   // 设备类型: mobile / desktop / web / pad
}

// cmd = 2: 绑定响应
message BindResponse {
  int32  code     = 1;   // 0=成功, 其他=失败码
  string message  = 2;   // 提示信息
  string serverId = 3;   // 当前节点ID
}

// cmd = 3: 心跳请求
message Heartbeat {
  int64 clientTime = 1;
}

// cmd = 4: 心跳响应
message HeartbeatResponse {
  int64 serverTime = 1;
}

// cmd = 5: 踢人通知（服务端 → 客户端，被踢下线时发送）
message KickNotify {
  int32  code    = 1;   // 踢人原因码: 409=同设备互踢
  string message = 2;   // 提示信息
}

// ===================== 聊天消息 (cmd: 10-19) =====================

// cmd = 10: 单聊消息（客户端 → 服务端）
// cmd = 11: 群聊消息（客户端 → 服务端）
message ChatMessage {
  string msgId          = 1;   // 服务端分配的消息ID（下行时填充）
  int32  chatType       = 2;   // 1-单聊 2-群聊
  string senderId       = 3;   // 发送者ID
  string receiverId     = 4;   // 接收者ID（单聊=对方userId, 群聊=groupId）
  int32  contentType    = 5;   // 1-text 2-image 3-audio 4-video 5-file 6-location 7-custom
  string content        = 6;   // 文本内容 或 JSON（文件URL/位置信息等）
  string conversationId = 7;   // 会话ID
  map<string, string> ext = 8; // 扩展字段（自定义业务数据）
}

// cmd = 12: 服务端 ACK（服务器确认收到消息）
message ServerAck {
  string clientRequestId = 1;  // 客户端的 requestId（关联原始请求）
  string serverMsgId     = 2;  // 服务端分配的消息ID
  int32  code             = 3;  // 0=成功
  int64  serverTime       = 4;  // 服务器时间戳
}

// cmd = 13: 送达 ACK（接收方客户端 → 服务端）
message DeliveryAck {
  string msgId      = 1;  // 确认收到的消息ID
  string fromUserId = 2;  // 接收方userId
}

// cmd = 14: 已读回执
message ReadReceipt {
  string conversationId = 1;  // 会话ID
  string lastReadMsgId  = 2;  // 最后已读的消息ID
}

// cmd = 15: 消息撤回请求（客户端 → 服务端）
message MsgRecallRequest {
  string msgId          = 1;  // 要撤回的消息ID
  string conversationId = 2;  // 会话ID
  int32  chatType       = 3;  // 1-单聊 2-群聊
}

// cmd = 16: 消息撤回通知（服务端 → 客户端，推送给对方）
message MsgRecallNotify {
  string msgId          = 1;  // 被撤回的消息ID
  string conversationId = 2;  // 会话ID
  string operatorId     = 3;  // 撤回操作者ID
  int32  chatType       = 4;  // 1-单聊 2-群聊
}

// ===================== 在线状态 (cmd: 20-29) =====================

// cmd = 20: 在线状态变更通知（服务端推送给关注方）
message OnlineStatusNotify {
  string userId  = 1;
  int32  status  = 2;   // 1-上线 0-下线
  string device  = 3;   // 设备类型
}

// ===================== 好友通知 (cmd: 30-39) =====================

// cmd = 30: 好友申请通知（服务端推送）
message FriendRequestNotify {
  string fromUserId = 1;
  string toUserId   = 2;  // 被申请方ID（集群路由用）
  string nickname   = 3;
  string avatar     = 4;
  string message    = 5;  // 验证消息
}

// cmd = 31: 好友状态变更通知
message FriendStatusNotify {
  string userId    = 1;
  string toUserId  = 2;  // 通知接收方ID（集群路由用）
  int32  status    = 3;  // 1-已接受 2-已拒绝
}

// ===================== 群组通知 (cmd: 40-49) =====================

// cmd = 40: 群成员变更通知
message GroupMemberNotify {
  string groupId    = 1;
  int32  action     = 2;  // 1-加入 2-退出 3-被踢 4-被邀请
  string userId     = 3;
  string operatorId = 4;
}

// cmd = 41: 群信息/事件通知（群信息变更、公告、禁言、角色变更等）
message GroupNotify {
  string groupId      = 1;
  int32  action       = 2;  // 1-信息变更 2-公告更新 3-全员禁言 4-成员禁言 5-角色变更 6-转让群主
  string operatorId   = 3;  // 操作者 userId
  string targetUserId = 4;  // 目标用户 userId（禁言/角色变更时使用）
  string content      = 5;  // 变更内容（JSON: {"name":"xx","announcement":"xx"} 或禁言状态等）
}

// cmd = 42: 入群申请通知
message GroupJoinRequestNotify {
  string groupId    = 1;
  string userId     = 2;  // 申请人
  string operatorId = 3;  // 审批人（群主/管理员）
  int32  status     = 4;  // 0-待审批 1-已同意 2-已拒绝
  string message    = 5;  // 申请留言
}

// ===================== WebRTC 信令 (cmd: 50-59) =====================

// cmd = 50: WebRTC 信令消息
message RtcSignal {
  int32  signalType = 1;  // 信令类型（见下方枚举）
  string fromUserId = 2;
  string toUserId   = 3;
  string payload    = 4;  // JSON: SDP / ICE candidate / 通话类型等数据
  string callId     = 5;  // 通话唯一ID（服务端创建会话时生成，回传给双方）
}
// signalType 枚举（与客户端 RtcSignalType 保持一致）：
// 1=offer, 2=answer, 3=iceCandidate,
// 4=callRequest, 5=callAccept, 6=callReject, 7=callCancel, 8=callHangup
